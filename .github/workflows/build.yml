name: Build .NET + React

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
    
jobs:
  versionamento:
    runs-on: ubuntu-latest
    name: Versionamento 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: codacy/git-version@2.8.0
        id: version
        with:
          release-branch: main
          prefix: v

      - name: Tag do repositorio
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ::notice:: ${{ steps.version.outputs.version }}
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          git tag -a ${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push --tags
        if: github.ref == 'refs/heads/main'
          
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do code
        uses: actions/checkout@v4      

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and Test
        run: |
          dotnet restore ./ReactApp/ReactApp.sln
          dotnet build --no-restore ./ReactApp/ReactApp.sln
          dotnet test ./ReactApp/ReactApp.sln --no-restore --no-build --logger trx --results-directory "TestResults"

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-tests-results
          path: TestResults   

      - name: Restaurar dependências .NET
        run: dotnet restore ./ReactApp/ReactApp.sln

      - name: Build .NET
        run: dotnet build ./ReactApp/ReactApp.sln --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./ReactApp/reactapp.client/package-lock.json

      - name: Instalar dependências do React
        run: npm install
        working-directory: ./ReactApp/reactapp.client

      - name: Build do React
        run: npm run build
        working-directory: ./ReactApp/reactapp.client