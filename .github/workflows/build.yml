name: Build .NET + React

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    
concurrency:
  group: ${{ github.workflow}}
  cancel-in-progress: true  

jobs:
  versionamento:
    runs-on: ubuntu-latest
    name: Versionamento 
    
    steps:
      - name: Checkout code 
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: codacy/git-version@2.8.0
        id: version
        with:
          release-branch: main
          prefix: v

      - name: Tag do repositorio
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ::notice:: ${{ steps.version.outputs.version }}
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          git tag -a ${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push --tags
        if: github.ref == 'refs/heads/main'
          
  backend-build-and-test:
    needs: versionamento
    runs-on: ubuntu-latest
    name: Backend Build and Test

    steps:
      - name: Checkout do code
        uses: actions/checkout@v4      

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore 
        run: |
          dotnet restore ./ReactApp/ReactApp.sln

      - name: Build 
        run: |          
          dotnet build --no-restore ./ReactApp/ReactApp.sln

      - name: Test
        run: |
          dotnet test --no-build --no-restore ./ReactApp/ReactApp.sln --configuration Release --logger trx --results-directory "TestResults"
          
      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-tests-results
          path: TestResults

  frontend-build-and-test:
    needs: versionamento
    runs-on: ubuntu-latest
    name: Build and Test Frontend
    defaults:
      run:
        working-directory: ./ReactApp/reactapp.client

    steps:
      - name: Checkout do code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./ReactApp/reactapp.client/package-lock.json

      - name: Instalar dependências       
        run: | 
          npm ci

      - name: Testes de lint      
        run: | 
          npm run lint
      
      - name: Build       
        run: | 
          npm run build

  backend-lint:
    needs: versionamento
    runs-on: ubuntu-latest
    name: Lint Backend

    steps:
      - name: Checkout do code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        
          
      - uses: github/super-linter@v4
        env:
          default_branch: main
          Validate_all_codebase: false
          VALIDATE_YAML: true
          VALIDATE_CSHARP: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-lint:
    needs: versionamento
    runs-on: ubuntu-latest
    name: Lint Frontend
    defaults:
      run:
        working-directory: ./ReactApp/reactapp.client

    steps:
      - name: Checkout do code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./ReactApp/reactapp.client/package-lock.json

      - name: Install dependências       
        run: | 
          npm ci

      - name: Testes de lint      
        run: | 
          npm run lint

  