name: Build .NET + React

on:
  push:
    branches:
      - add-workflow-manual
  pull_request:
    branches:
      - main
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and Test
        run: |
          dotnet restore ./ReactApp/ReactApp.sln
          dotnet build --no-restore ./ReactApp/ReactApp.sln
          dotnet test .ReactApp/ReactApp.sln --no-restore --no-build --logger trx --results-directory "TestResults"

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-tests-results
          path: TestResults   

      - name: Restaurar dependências .NET
        run: dotnet restore ./ReactApp/ReactApp.sln

      - name: Build .NET
        run: dotnet build ./ReactApp/ReactApp.sln --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./ReactApp/reactapp.client/package-lock.json

      - name: Instalar dependências do React
        run: npm install
        working-directory: ./ReactApp/reactapp.client

      - name: Build do React
        run: npm run build
        working-directory: ./ReactApp/reactapp.client